<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h1 class="title">sign up</h1>
            <div class="underline">
            </div> <!--end underline-->
            <form action="">
                <div class="input-group">
                    <div class="input-field namefield">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="name" id="name" pattern = "[A-Za-z ]+" title="Name should contain only letters" required>
                    </div> <!--end of input-field-->

                    <div class="input-field">
                        <i class="fa-solid fa-at"></i>
                        <input type="email" placeholder="email" id="email" required>
                    </div> <!--end of input-field-->

                    <div class="input-field">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" placeholder="password" id="password" required>
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div> <!--end of input-field-->

                    <p><span class="text">password suggestions</span> 
                        <a href="#">click here!</a>
                    </p>

                </div> <!--end of input-group-->
                <div class="btn-field">
                    <button type="button" class="signupBtn">Sign up</button>
                    <button type="button" class="disable signinBtn">Sign in</button>
                </div> <!--end of btn-field-->
            </form>
        </div> <!--end form-box-->
    </div> <!--end container-->
    <!--custon js link-->
    <script src="script.js"></script>
</body>

</html>
